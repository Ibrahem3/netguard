name: netguard
description: "NetGuard - Advanced LAN Network Monitor & Controller for Linux"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  window_manager: ^0.3.9
  shared_preferences: ^2.2.3 # For saving device names
  http: ^1.2.1               # To download the OUI database
  path_provider: ^2.1.3      # To find the correct local path to save the database

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
